<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>🎤 Add a song</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="remote">
  <header>
    <span id="now">Nothing playing</span>
    <button id="name-btn">👤 <span id="name">set name</span></button>
  </header>

  <div class="transport" id="transport">
    <button id="r-restart" title="Restart song">⏮ Restart</button>
    <button id="r-playpause" title="Play / Pause">▶ Play</button>
    <button id="r-skip" title="Skip">⏭ Skip</button>
  </div>

  <div class="search-bar">
    <input id="q" type="search" placeholder="Search for a song…" autocomplete="off" />
    <label class="kk"><input type="checkbox" id="kk" checked /> karaoke</label>
  </div>
  <div id="results"></div>

  <details class="paste">
    <summary>Paste a YouTube link instead</summary>
    <div class="paste-row">
      <input id="url" placeholder="https://youtube.com/watch?v=…" />
      <button id="add-url">Add</button>
    </div>
  </details>

  <h2>Queue <span id="count"></span></h2>
  <ol id="queue" class="queue"></ol>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="/remote.js"></script>
</body>
</html>
