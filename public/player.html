<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>🎤 KARA·TRON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Michroma&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/player.css" />
</head>
<body class="player">
  <!-- One-time click to satisfy autoplay-with-sound -->
  <div id="start-overlay">
    <div class="start-card">
      <button id="start-btn">⏻ POWER ON</button>
      <p>Click once to enable sound &amp; autoplay</p>
    </div>
  </div>

  <div id="stage">
    <!-- ===== The TV ===== -->
    <div class="tv">
      <div class="tv-top">
        <span class="brand">KARA·TRON</span>
        <span class="model">MODEL KT-88 · STEREO COLOR</span>
      </div>

      <div class="tv-body">
        <div class="screen-area">
          <div class="screen">
            <div id="player-frame"></div>
            <div id="idle" class="idle">
              <div class="idle-inner">
                <span class="noise">▓▒░</span>
                <span class="big">NO SIGNAL</span>
                <small>scan the QR to queue a song 🎶</small>
              </div>
            </div>
            <div class="crt-overlay" aria-hidden="true"></div>
            <!-- Eats all hover/clicks so YouTube's UI never appears; playback is API-driven -->
            <div class="screen-block" aria-hidden="true"></div>
          </div>
        </div>

        <div class="control-column">
          <div class="speaker" aria-hidden="true"></div>
          <div class="knobs" aria-hidden="true">
            <div class="knob"><i></i></div>
            <div class="knob"><i></i></div>
          </div>
          <div class="power"><span class="led"></span>PWR</div>
        </div>
      </div>

      <div class="tv-controls">
        <button id="playpause" class="tvbtn">▶ PLAY</button>
        <button id="skip" class="tvbtn">⏭ SKIP</button>
      </div>
    </div>

    <!-- ===== Side channel panel ===== -->
    <aside id="side">
      <section class="panel qr-panel">
        <div class="panel-title">📡 TUNE IN</div>
        <div id="qrcode"></div>
        <div class="join">scan to add songs<br /><span id="join-url"></span></div>
      </section>

      <section class="panel queue-panel">
        <div class="panel-title">▶ UP NEXT</div>
        <ol id="queue" class="queue"></ol>
      </section>
    </aside>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="/player.js"></script>
</body>
</html>
